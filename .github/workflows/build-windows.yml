name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.109

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails3 task windows:build ARCH=amd64 CGO_ENABLED=0

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kutyaguru-booking-windows
          path: bin/kutyaguru-booking.exe
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: bin/kutyaguru-booking.exe
